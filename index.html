<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Gioi Thieu Ca Nhan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <section class="card">
            <p class="tag">Spring Boot Mini Page</p>
            <h1>Gioi thieu ban than</h1>
            <p class="lead">Xin chao, minh la <strong id="fullName">Nguyen Van A</strong>.</p>

            <div class="info-grid">
                <article class="info-item">
                    <span class="label">Nam sinh</span>
                    <span class="value" id="birthYear">2004</span>
                </article>
                <article class="info-item">
                    <span class="label">Tuoi</span>
                    <span class="value" id="age">0</span>
                </article>
                <article class="info-item">
                    <span class="label">Truong hoc</span>
                    <span class="value" id="school">Dai hoc Vi Du</span>
                </article>
                <article class="info-item">
                    <span class="label">Nganh hoc</span>
                    <span class="value" id="major">Cong nghe thong tin</span>
                </article>
            </div>

            <p class="description" id="bio">
                Minh yeu thich lap trinh web, hoc cong nghe moi va xay dung cac du an nho de nang cao ky nang.
            </p>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
